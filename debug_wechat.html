<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wechat Format Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #preview-frame { width: 100%; height: 400px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Wechat Format Debug</h1>
    <button onclick="runTest()">Run Full Test</button>
    <div id="result"></div>
    <h2>Preview:</h2>
    <iframe id="preview-frame"></iframe>

    <script>
        const API = 'http://localhost:8766/api';

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(API + path, opts);
            if (!r.ok) {
                const e = await r.text();
                throw new Error(`HTTP ${r.status}: ${e}`);
            }
            return r.json();
        }

        async function runTest() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Running test...</p>';

            try {
                // Step 1: Test API directly
                const content = '# 标题\n\n这是正文内容。\n\n## 第二章\n\n列表：\n- 项目1\n- 项目2';
                const res = await api('POST', '/wechat-format', { content, theme: 'wechat-native' });

                // Step 2: Check response
                let checks = [];
                checks.push(`API Status: 200 OK`);
                checks.push(`HTML length: ${res.html ? res.html.length : 'undefined'}`);
                checks.push(`Has style=: ${res.html && res.html.includes('style=')}`);
                checks.push(`Has gradient: ${res.html && res.html.includes('gradient')}`);
                checks.push(`Has border: ${res.html && res.html.includes('border')}`);
                checks.push(`Word count: ${res.word_count}`);

                result.innerHTML = checks.map(c => `<p class="success">${c}</p>`).join('');

                // Step 3: Write to iframe
                if (res.html) {
                    const escapedHtml = res.html
                        .replace(/`/g, '\\`')
                        .replace(/\$\{/g, '\\${');
                    const baseStyle = "*{box-sizing:border-box}html,body{margin:0;padding:0;background:#fff}body{padding:16px 24px;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;line-height:1.75;color:#333}img{max-width:100%;display:block;margin:8px auto}";
                    const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${baseStyle}</style></head><body>${escapedHtml}</body></html>`;

                    const iframe = document.getElementById('preview-frame');
                    iframe.srcdoc = fullHtml;

                    result.innerHTML += `<p class="success">Written to iframe</p>`;
                    result.innerHTML += `<details><summary>Raw HTML</summary><pre>${res.html.substring(0, 1000)}...</pre></details>`;
                }

            } catch(e) {
                result.innerHTML = `<p class="error">Error: ${e.message}</p>`;
                console.error(e);
            }
        }
    </script>
</body>
</html>
