<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>排版问题诊断</title>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { color: #333; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .test-section h2 { margin-top: 0; font-size: 16px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background: #4A90D9; color: white; border: none; border-radius: 5px; }
        button:hover { background: #3B82F6; }
        button:disabled { background: #ccc; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 13px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        #preview-frame { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 4px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>📱 公众号排版问题诊断</h1>

    <div class="test-section">
        <h2>Step 1: 诊断 API 连接</h2>
        <button onclick="testApi()">测试 API</button>
        <div id="api-result" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>Step 2: 诊断主题加载</h2>
        <button onclick="testThemes()">测试主题</button>
        <div id="themes-result" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>Step 3: 诊断排版功能</h2>
        <button onclick="testFormat()">测试排版</button>
        <div id="format-result" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>Step 4: 预览效果</h2>
        <iframe id="preview-frame"></iframe>
    </div>

    <div class="test-section">
        <h2>Step 5: 诊断报告</h2>
        <div id="diagnostic-report"></div>
    </div>

    <script>
        const API = 'http://localhost:8766/api';

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(API + path, opts);
            if (!r.ok) {
                const e = await r.text();
                throw new Error(`HTTP ${r.status}: ${e}`);
            }
            return r.json();
        }

        function showResult(id, html, type) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            el.className = 'result ' + (type || '');
            el.innerHTML = html;
        }

        async function testApi() {
            showResult('api-result', '测试中...');
            try {
                const r = await fetch(API);
                if (r.ok) {
                    showResult('api-result', '<b>✅ API 服务器连接正常</b><br>状态码: ' + r.status, 'success');
                } else {
                    showResult('api-result', '<b>❌ API 连接异常</b><br>状态码: ' + r.status, 'error');
                }
            } catch(e) {
                showResult('api-result', '<b>❌ 无法连接到 API 服务器</b><br>错误: ' + e.message + '<br><br>可能原因：<br>1. 后端服务未启动<br>2. 端口不是 8766<br>3. 防火墙阻止连接', 'error');
            }
        }

        async function testThemes() {
            showResult('themes-result', '测试中...');
            try {
                const themes = await api('GET', '/wechat-themes');
                if (Array.isArray(themes) && themes.length > 0) {
                    const list = themes.map(t => `<li>${t.id}: ${t.label || t.id}</li>`).join('');
                    showResult('themes-result', `<b>✅ 主题加载正常</b><br>主题数量: ${themes.length}<br><ul>${list}</ul>`, 'success');
                } else {
                    showResult('themes-result', '<b>⚠️ 主题列表异常</b><br>返回: ' + JSON.stringify(themes), 'warning');
                }
            } catch(e) {
                showResult('themes-result', '<b>❌ 主题加载失败</b><br>错误: ' + e.message, 'error');
            }
        }

        async function testFormat() {
            showResult('format-result', '测试中...');
            try {
                const testContent = '# 标题\n\n这是测试正文内容。\n\n## 第二章\n\n- 列表项1\n- 列表项2';
                const res = await api('POST', '/wechat-format', { content: testContent, theme: 'wechat-native' });

                let checks = [];
                let hasIssue = false;

                checks.push(`<b>API 响应:</b>`);
                checks.push(`- HTML 长度: ${res.html ? res.html.length : 'undefined'} 字符`);

                if (!res.html) {
                    checks.push(`- <b>❌ HTML 为空</b>`);
                    hasIssue = true;
                } else {
                    if (res.html.includes('style=')) checks.push(`- ✅ 包含内联样式`);
                    else { checks.push(`- <b>❌ 缺少内联样式</b>`); hasIssue = true; }

                    if (res.html.includes('gradient')) checks.push(`- ✅ 包含渐变样式`);
                    else checks.push(`- ⚠️ 不包含渐变（可能主题问题）`);

                    if (res.html.includes('border')) checks.push(`- ✅ 包含边框样式`);
                    else checks.push(`- ⚠️ 不包含边框`);
                }

                checks.push(`- 字数: ${res.word_count}`);
                checks.push(`- 主题: ${res.theme}`);

                // Write to iframe
                if (res.html) {
                    const escapedHtml = res.html
                        .replace(/`/g, '\\`')
                        .replace(/\$\{/g, '\\${');
                    const baseStyle = "*{box-sizing:border-box}html,body{margin:0;padding:0;background:#fff}body{padding:16px 24px;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;font-size:15px;line-height:1.75;color:#333}img{max-width:100%;display:block;margin:8px auto}";
                    const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${baseStyle}</style></head><body>${escapedHtml}</body></html>`;
                    document.getElementById('preview-frame').srcdoc = fullHtml;
                }

                showResult('format-result', checks.join('<br>'), hasIssue ? 'warning' : 'success');

                // Generate report
                generateReport();

            } catch(e) {
                showResult('format-result', '<b>❌ 排版调用失败</b><br>错误: ' + e.message, 'error');
            }
        }

        function generateReport() {
            const apiEl = document.getElementById('api-result');
            const themesEl = document.getElementById('themes-result');
            const formatEl = document.getElementById('format-result');

            let report = '<b>诊断总结:</b><br>';

            if (apiEl.classList.contains('success') &&
                themesEl.classList.contains('success') &&
                formatEl.classList.contains('success')) {
                report += '✅ 所有测试通过！排版功能应该正常工作。<br><br>';
                report += '如果预览效果仍然不对，可能原因：<br>';
                report += '1. 浏览器缓存问题 → 请尝试 Ctrl+F5 强制刷新<br>';
                report += '2. localStorage 存储了异常状态 → 请清除浏览器缓存<br>';
                report += '3. 浏览器扩展干扰 → 请尝试无痕/隐私模式<br>';
            } else {
                report += '⚠️ 发现问题，请查看上述详细结果。';
            }

            document.getElementById('diagnostic-report').innerHTML = report;
        }
    </script>
</body>
</html>
