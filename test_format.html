<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>排版功能测试</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f5; }
.test-box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #07c160; color: white; border: none; border-radius: 6px; }
button:disabled { background: #ccc; }
#result { background: white; padding: 20px; border-radius: 8px; margin-top: 10px; min-height: 200px; border: 1px solid #ddd; }
#error { color: red; padding: 10px; background: #fee; border-radius: 6px; margin-top: 10px; display: none; }
pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
.status { padding: 10px; border-radius: 6px; margin-bottom: 10px; }
.status.ok { background: #d4edda; color: #155724; }
.status.fail { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h1>排版功能测试</h1>

<div class="test-box">
<h3>API 测试</h3>
<div id="api-status" class="status">等待测试...</div>
<button id="test-btn" onclick="runTest()">运行测试</button>
<div id="error"></div>
</div>

<div class="test-box">
<h3>排版预览</h3>
<div id="result"><em>点击测试按钮查看结果</em></div>
</div>

<script>
const API = 'http://localhost:8766/api';

async function runTest() {
  const btn = document.getElementById('test-btn');
  const status = document.getElementById('api-status');
  const result = document.getElementById('result');
  const error = document.getElementById('error');

  btn.disabled = true;
  status.className = 'status';
  status.textContent = '测试中...';
  error.style.display = 'none';

  try {
    // 测试 1: 获取主题
    status.textContent = '测试1: 获取主题列表...';
    const themes = await fetch(API + '/wechat-themes').then(r => r.json());

    if (!themes || themes.length === 0) {
      throw new Error('主题列表为空');
    }
    status.textContent = '测试1通过: 获取到 ' + themes.length + ' 个主题';

    // 测试 2: 排版
    status.textContent = '测试2: 排版API...';
    const content = '# 测试标题\n\n这是一段**加粗**和*斜体*的测试内容。\n\n## 子标题\n\n- 列表项1\n- 列表项2\n\n> 这是一段引用';
    const res = await fetch(API + '/wechat-format', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: content, theme: 'wechat-native' })
    }).then(r => r.json());

    if (!res.html) {
      throw new Error('API返回没有html字段');
    }

    const styleCount = (res.html.match(/style="/g) || []).length;
    status.className = 'status ok';
    status.textContent = '测试通过! 主题:' + res.theme + ', 字数:' + res.word_count + ', 样式数:' + styleCount;

    // 显示预览
    result.innerHTML = '<h4>生成的HTML (前500字符):</h4><pre>' + res.html.slice(0, 500) + '...</pre>';

    if (styleCount > 0) {
      result.innerHTML += '<p style="color:green">✅ 排版正常! 检测到 ' + styleCount + ' 个内联样式</p>';
    } else {
      result.innerHTML += '<p style="color:red">❌ 排版异常: 没有内联样式</p>';
    }

  } catch (e) {
    status.className = 'status fail';
    status.textContent = '测试失败';
    error.textContent = '错误: ' + e.message;
    error.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
}

// 页面加载时自动运行测试
window.onload = runTest;
</script>
</body>
</html>
