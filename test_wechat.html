<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wechat Format Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 100px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>微信公众号排版测试</h1>
    <button onclick="testFormat()">测试排版API</button>
    <button onclick="testThemes()">测试主题API</button>
    <div id="result"></div>

    <script>
        const API = 'http://localhost:8766/api';

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            console.log('Request:', method, API + path, opts);
            const r = await fetch(API + path, opts);
            console.log('Response status:', r.status);
            console.log('Response headers:', [...r.headers.entries()]);
            if (!r.ok) {
                const e = await r.text();
                console.error('Error response:', e);
                throw new Error(e);
            }
            return r.json();
        }

        async function testFormat() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>正在测试...</p>';
            result.className = '';

            try {
                const content = `# 这是一篇测试文章

这是正文内容，包含一些中文文字。

## 第二章

这里是第二章的内容。

- 列表项1
- 列表项2
- 列表项3
`;
                console.log('Sending content:', content);
                const res = await api('POST', '/wechat-format', { content, theme: 'newspaper' });
                console.log('Response:', res);

                result.innerHTML = `
                    <p class="success">成功!</p>
                    <p>HTML长度: ${res.html ? res.html.length : 'undefined'}</p>
                    <p>字数: ${res.word_count}</p>
                    <p>主题: ${res.theme}</p>
                    <details>
                        <summary>HTML预览 (前500字符)</summary>
                        <pre style="word-break:break-all;max-width:100%">${(res.html || '').substring(0, 500)}</pre>
                    </details>
                `;
                result.className = 'success';
            } catch(e) {
                result.innerHTML = `<p class="error">错误: ${e.message}</p>`;
                result.className = 'error';
                console.error('Test failed:', e);
            }
        }

        async function testThemes() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>正在测试...</p>';

            try {
                const res = await api('GET', '/wechat-themes');
                result.innerHTML = `
                    <p class="success">成功!</p>
                    <p>主题数量: ${Array.isArray(res) ? res.length : '不是数组'}</p>
                    <p>第一个主题: ${JSON.stringify(res[0])}</p>
                `;
            } catch(e) {
                result.innerHTML = `<p class="error">错误: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
