<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>排版渲染测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test-box { border: 2px solid #333; padding: 20px; margin: 20px 0; }
        h1 { color: #163325; border-left: 5px solid #07c160; padding: 12px 16px 11px; background: linear-gradient(180deg, rgba(7,193,96,0.08) 0%, rgba(7,193,96,0.03) 100%); }
        h2 { color: #067647; border-left: 4px solid #07c160; padding: 10px 14px; background: linear-gradient(90deg, rgba(7,193,96,0.12) 0%, rgba(7,193,96,0.03) 70%, rgba(7,193,96,0) 100%); }
        p { font-size: 15px; color: #333333; line-height: 1.75; }
        blockquote { border-left: 4px solid #07c160; background: linear-gradient(135deg, #f0f7f2 0%, #f8fcf9 100%); padding: 16px 20px; border-radius: 12px; }
        hr { height: 2px; background: linear-gradient(90deg, rgba(7,193,96,0) 0%, rgba(7,193,96,0.22) 20%, rgba(7,193,96,0.68) 50%, rgba(7,193,96,0.22) 80%, rgba(7,193,96,0) 100%); border: none; }
        .list-item { display: flex; margin-bottom: 8px; }
        .bullet { color: #07c160; margin-right: 8px; font-weight: bold; }
        .text { font-size: 15px; color: #333333; line-height: 1.75; }
    </style>
</head>
<body>
    <h1>渲染测试 - 直接用浏览器打开此文件</h1>
    <p>如果下面显示正常，说明浏览器支持这些CSS特性。</p>

    <div class="test-box">
        <h1>这是一级标题</h1>
        <p>这是正文内容，有一段话。用来测试渲染是否正常。</p>

        <h2>这是二级标题</h2>

        <div class="list-item">
            <span class="bullet">•</span>
            <span class="text">列表项目1</span>
        </div>
        <div class="list-item">
            <span class="bullet">•</span>
            <span class="text">列表项目2</span>
        </div>

        <blockquote>这是引用内容区块</blockquote>

        <hr style="margin-top: 36px; margin-bottom: 36px; width: 62%;">

        <p><strong>加粗文字</strong> 和 <em>斜体文字</em></p>
    </div>

    <p>上面的内容应该显示为：</p>
    <ul>
        <li>绿色边框的标题块（带渐变背景）</li>
        <li>绿色左边框的引用区块</li>
        <li>渐变色的分隔线</li>
        <li>带圆点的列表</li>
    </ul>
</body>
</html>
