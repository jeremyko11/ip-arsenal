<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    <button onclick="testApi()">Test API Call</button>
    <div id="result"></div>
    <script>
        const API = 'http://localhost:8766/api';

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            console.log('Fetching:', API + path);
            console.log('Options:', opts);
            const r = await fetch(API + path, opts);
            console.log('Response status:', r.status);
            if (!r.ok) { const e = await r.text(); throw new Error(e); }
            return r.json();
        }

        async function testApi() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            try {
                const content = '# Test\n\nThis is a test article.';
                const res = await api('POST', '/wechat-format', { content, theme: 'newspaper' });
                resultDiv.innerHTML = '<p style="color:green">Success!</p><p>HTML length: ' + res.html.length + '</p><p>Word count: ' + res.word_count + '</p>';
            } catch(e) {
                resultDiv.innerHTML = '<p style="color:red">Error: ' + e.message + '</p>';
                console.error('API Error:', e);
            }
        }
    </script>
</body>
</html>
