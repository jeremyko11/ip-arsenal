// ─── 爬虫控制 ─────────────────────────────────────────────────
async function mcLoadStatus() {
  try {
    const res = await mcApi('GET', '/crawler/status');
    _mc.status = res.status || 'idle';
    _mc.platform = res.platform || 'dy';
    _mc.crawlerType = res.crawler_type || 'search';
    mcUpdateStatusUI();
  } catch(e) {
    _mc.status = 'error';
    mcUpdateStatusUI();
  }
}

function mcUpdateStatusUI() {
  const dot = document.getElementById('mc-status-dot');
  const text = document.getElementById('mc-status-text');
  const info = document.getElementById('mc-status-info');
  const btnStart = document.getElementById('mc-btn-start');
  const btnStop = document.getElementById('mc-btn-stop');

  dot.className = 'mc-status-indicator ' + _mc.status;
  text.textContent = _mc.status.toUpperCase();

  const statusText = {
    idle: '空闲',
    running: '采集中',
    stopping: '停止中',
    error: '错误'
  };
  text.textContent = statusText[_mc.status] || _mc.status.toUpperCase();

  if (_mc.platform) {
    const platformNames = { dy: '抖音', xhs: '小红书', wb: '微博', ks: '快手', bili: 'B站', tieba: '贴吧', zhihu: '知乎' };
    info.textContent = _mc.platform ? platformNames[_mc.platform] || _mc.platform : '';
  }

  if (_mc.status === 'running') {
    btnStart.style.display = 'none';
    btnStop.style.display = 'block';
  } else {
    btnStart.style.display = 'block';
    btnStop.style.display = 'none';
  }
}

function mcConfigChange(key, value) {
  if (key === 'platform') _mc.platform = value;
  else if (key === 'loginType') _mc.loginType = value;
  else if (key === 'crawlerType') _mc.crawlerType = value;
  else if (key === 'keywords') _mc.keywords = value;
  else if (key === 'enableComments') _mc.enableComments = value;
  else if (key === 'enableSubComments') _mc.enableSubComments = value;
  else if (key === 'headless') _mc.headless = value;
  else if (key === 'saveOption') _mc.saveOption = value;
}

async function mcStart() {
  const btn = document.getElementById('mc-btn-start');
  btn.disabled = true;
  btn.textContent = '启动中...';

  try {
    const crawlerTypeMap = { 'search': 'search', 'detail': 'detail', 'creator': 'creator' };
    const loginTypeMap = { 'qrcode': 'qrcode', 'cookie': 'cookie' };
    const saveOptionMap = { 'jsonl': 'jsonl', 'json': 'json', 'csv': 'csv', 'excel': 'excel', 'sqlite': 'sqlite' };

    const req = {
      platform: _mc.platform,
      login_type: loginTypeMap[_mc.loginType] || 'qrcode',
      crawler_type: crawlerTypeMap[_mc.crawlerType] || 'search',
      keywords: _mc.keywords,
      enable_comments: _mc.enableComments,
      enable_sub_comments: _mc.enableSubComments,
      headless: _mc.headless,
      save_option: saveOptionMap[_mc.saveOption] || 'jsonl',
    };

    const res = await mcApi('POST', '/crawler/start', req);
    if (res.status === 'ok') {
      _mc.status = 'running';
      mcUpdateStatusUI();
      mcAppendLog({ level: 'success', message: '✅ 爬虫启动成功！' });
      // 清空日志
      _mc.logs = [];
      document.getElementById('mc-log-terminal').innerHTML = '';
    } else {
      mcAppendLog({ level: 'error', message: '❌ 启动失败: ' + (res.message || '未知错误') });
    }
  } catch(e) {
    mcAppendLog({ level: 'error', message: '❌ 启动失败: ' + (e.message || e) });
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 启动';
  }
}

async function mcStop() {
  const btn = document.getElementById('mc-btn-stop');
  btn.disabled = true;
  btn.textContent = '停止中...';

  try {
    await mcApi('POST', '/crawler/stop');
    _mc.status = 'stopping';
    mcUpdateStatusUI();
    mcAppendLog({ level: 'warn', message: '🛑 正在停止爬虫...' });
  } catch(e) {
    mcAppendLog({ level: 'error', message: '❌ 停止失败: ' + (e.message || e) });
  } finally {
    btn.disabled = false;
    btn.textContent = '■ 停止';
  }
}

// ─── API 调用 ──────────────────────────────────────────────────
const _mcApiBase = '/api/mediacrawler';

async function mcApi(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(_mcApiBase + path, opts);
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  return r.json();
}

// ─── 日志 ──────────────────────────────────────────────────────
let _mcLogId = 0;

function mcAppendLog(entry) {
  _mc.logs.push(entry);
  const terminal = document.getElementById('mc-log-terminal');
  if (!terminal) return;

  // 移除空状态提示
  const empty = terminal.querySelector('.mc-log-empty');
  if (empty) empty.remove();

  const levelIcons = { info: 'ℹ', warn: '⚠', error: '✖', success: '✓' };
  const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });

  const div = document.createElement('div');
  div.className = 'mc-log-entry ' + (entry.level || 'info');
  div.innerHTML = `
    <span class="mc-log-ts">${ts}</span>
    <span class="mc-log-level">${levelIcons[entry.level] || '·'}</span>
    <span class="mc-log-msg">${escapeHtml(entry.message || '')}</span>
  `;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

// ─── WebSocket 实时更新 ────────────────────────────────────────
let _mcWsStatus = null;
let _mcWsLogs = null;

function mcConnectWs() {
  mcDisconnectWs();

  // Status WebSocket
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = protocol + '//' + location.host + _mcApiBase + '/ws/status';

  try {
    _mcWsStatus = new WebSocket(wsUrl);

    _mcWsStatus.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.status) {
          _mc.status = data.status;
          _mc.platform = data.platform || _mc.platform;
          mcUpdateStatusUI();
        }
      } catch(e) {}
    };

    _mcWsStatus.onclose = function() {
      _mcWsStatus = null;
      // 2秒后重连
      setTimeout(mcConnectWs, 2000);
    };

    _mcWsStatus.onerror = function() {
      _mcWsStatus.close();
    };
  } catch(e) {}

  // Logs WebSocket (通过轮询替代，因为跨域 WebSocket 较复杂)
  mcPollLogs();
}

function mcDisconnectWs() {
  if (_mcWsStatus) { _mcWsStatus.close(); _mcWsStatus = null; }
  if (_mcWsLogs) { _mcWsLogs.close(); _mcWsLogs = null; }
}

async function mcPollLogs() {
  if (_mc.status !== 'running' && _mc.status !== 'stopping') {
    setTimeout(mcPollLogs, 3000);
    return;
  }

  try {
    const res = await mcApi('GET', '/crawler/logs?limit=20');
    const logs = res.logs || [];
    for (const log of logs) {
      if (log.id > _mcLogId) {
        mcAppendLog({ level: log.level, message: log.message });
        _mcLogId = log.id;
      }
    }
  } catch(e) {}

  setTimeout(mcPollLogs, 1500);
}

  _mc.currentDataFile = filePath;
  _mc.dataRecords = [];
  _mc.selectedRecords.clear();

  // 重新渲染高亮
  document.querySelectorAll('.mc-data-file-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === filePath.split('/').pop());
  });

  const toolbar = document.getElementById('mc-data-toolbar');
  toolbar.innerHTML = '<span style="color:var(--accent)">加载中...</span>';
  document.getElementById('mc-data-records').innerHTML = '<div class="mc-empty loading-spinner">加载数据中...</div>';
  document.getElementById('mc-data-footer').style.display = 'none';

  try {
    const encoded = encodeURIComponent(filePath);
    const res = await mcApi('GET', '/data/files/' + encoded + '?preview=true&limit=50');
    _mc.dataRecords = res.records || [];
    _mc._dataTotal = res.total || 0;

    toolbar.innerHTML = `${filePath.split('/').pop()} <span style="color:var(--text3)">(${res.total} 条)</span>`;
    mcRenderDataRecords();
  } catch(e) {
    toolbar.innerHTML = '<span style="color:var(--error)">加载失败</span>';
    document.getElementById('mc-data-records').innerHTML = '<div class="mc-empty">' + escapeHtml(e.message || '加载失败') + '</div>';

function mcRenderDataRecords() {
  const container = document.getElementById('mc-data-records');
  const footer = document.getElementById('mc-data-footer');

  if (!_mc.dataRecords.length) {
    container.innerHTML = '<div class="mc-empty">暂无数据</div>';
    footer.style.display = 'none';
    return;
  }

  container.innerHTML = _mc.dataRecords.map((r, i) => {
    const content = r.content || r.desc || r.title || '(无内容)';
    const nickname = r.nickname || '';
    const liked = r.liked_count || r.like_count || r.comment_like_count || '0';
    const comment = r.comment_count || r.comments_count || r.sub_comment_count || '0';
    const isSelected = _mc.selectedRecords.has(i);

    return `
    <div class="mc-record${isSelected ? ' selected' : ''}" onclick="mcToggleRecord(${i}, event)">
      <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()" />
      <div class="mc-record-body">
        <div class="mc-record-text">${escapeHtml(content.substring(0, 200))}${content.length > 200 ? '...' : ''}</div>
        <div class="mc-record-meta">
          ${nickname ? '<span>👤 ' + escapeHtml(nickname) + '</span>' : ''}
          ${'<span>👍 ' + liked + '</span>'}
          ${'<span>💬 ' + comment + '</span>'}
          ${'<span>🌐 ' + (_mcDataPlatform || 'unknown') + '</span>'}
        </div>
      </div>
    </div>
    `;
  }).join('');

  footer.style.display = 'flex';
  mcUpdateSelectedCount();
}

function mcToggleRecord(index, event) {
  if (event.target.type === 'checkbox') return;
  if (_mc.selectedRecords.has(index)) {
    _mc.selectedRecords.delete(index);
  } else {
    _mc.selectedRecords.add(index);
  }
  const record = document.querySelectorAll('.mc-record')[index];
  if (record) {
    record.classList.toggle('selected', _mc.selectedRecords.has(index));
    record.querySelector('input[type="checkbox"]').checked = _mc.selectedRecords.has(index);
  }
  mcUpdateSelectedCount();
}

function mcUpdateSelectedCount() {
  const el = document.getElementById('mc-selected-count');
  if (el) el.textContent = '已选择: ' + _mc.selectedRecords.size + ' 条';

async function mcSendToLibrary() {
  if (_mc.selectedRecords.size === 0) {
    showToast('请先选择要导入的内容', 'warning');
    return;
  }

  const records = [];
  for (const idx of _mc.selectedRecords) {
    const r = _mc.dataRecords[idx];
    const content = r.content || r.desc || r.title || '';
    if (content) {
      records.push({
        platform: _mcDataPlatform,
        content: content,
        metadata: {
          nickname: r.nickname || '',
          liked_count: r.liked_count || r.like_count || 0,
          comment_count: r.comment_count || r.comments_count || 0,
          collect_count: r.collected_count || 0,
          ip_location: r.ip_location || '',
          source_keyword: r.source_keyword || '',
          create_time: r.create_time || '',
          note_url: r.note_url || r.aweme_url || '',
        }
      });
    }
  }

  if (records.length === 0) {
    showToast('没有有效内容可导入', 'warning');
    return;
  }

  try {
    const res = await api('POST', '/media/import', { records: records });
    showToast('✅ 已导入 ' + res.imported + ' 条素材', 'success');
    _mc.selectedRecords.clear();
    document.getElementById('mc-data-records').innerHTML = '<div class="mc-empty">已导入完成，可继续选择更多内容导入</div>';
    document.getElementById('mc-data-footer').style.display = 'none';
  } catch(e) {
    showToast('导入失败: ' + (e.message || e), 'error');
  }
}

async function loadMediaPlatforms() {
  try {
    const res = await api('GET', '/media/platforms');
    _mediaState.platforms = res.platforms || [];
    renderMediaPlatforms();
  } catch(e) {
    document.getElementById('media-platforms').innerHTML = '<div style="color:var(--error);font-size:12px;padding:8px">加载失败: ' + e.message + '</div>';
  }
}

function renderMediaPlatforms() {
  const container = document.getElementById('media-platforms');
  if (!_mediaState.platforms.length) {
    container.innerHTML = '<div style="color:var(--text3);font-size:12px">未找到采集数据<br>请先在 MediaCrawler 中采集数据</div>';
    return;
  }
  container.innerHTML = _mediaState.platforms.map(p => `
    <div class="media-platform-item${_mediaState.currentPlatform === p.id ? ' active' : ''}" onclick="selectMediaPlatform('${p.id}')">
      ${p.name}
    </div>
    <div class="media-files" id="media-files-${p.id}" style="display:${_mediaState.currentPlatform === p.id ? 'block' : 'none'}">
    </div>
  `).join('');
}

async function selectMediaPlatform(platformId) {
  _mediaState.currentPlatform = platformId;
  _mediaState.currentFile = '';
  _mediaState.records = [];
  _mediaState.selected.clear();
  renderMediaPlatforms();
  renderMediaFiles(platformId);
}

async function renderMediaFiles(platformId) {
  const container = document.getElementById('media-files-' + platformId);
  if (!container) return;
  container.innerHTML = '<div style="color:var(--text3);font-size:11px;padding:4px 8px">加载中...</div>';
  try {
    const res = await api('GET', '/media/files?platform=' + platformId);
    _mediaState.files = res.files || [];
    container.innerHTML = _mediaState.files.map(f => `
      <div class="media-file-item${_mediaState.currentFile === f.path ? ' active' : ''}" onclick="selectMediaFile('${f.path}', '${platformId}')">
        ${f.name} (${formatBytes(f.size)})
      </div>
    `).join('');
    if (!_mediaState.files.length) {
      container.innerHTML = '<div style="color:var(--text3);font-size:11px;padding:4px 8px">无数据文件</div>';
    }
  } catch(e) {
    container.innerHTML = '<div style="color:var(--error);font-size:11px;padding:4px 8px">加载失败</div>';
  }
}

async function selectMediaFile(filePath, platformId) {
  _mediaState.currentFile = filePath;
  _mediaState.records = [];
  _mediaState.selected.clear();
  renderMediaFiles(platformId);
  document.getElementById('media-toolbar').innerHTML = '<span class="loading-spinner">加载数据中...</span>';
  document.getElementById('media-records').innerHTML = '';
  document.getElementById('media-footer').style.display = 'none';

  try {
    const res = await api('GET', '/media/data?platform=' + platformId + '&file=' + encodeURIComponent(filePath) + '&offset=0&limit=50');
    _mediaState.records = res.records || [];
    _mediaState._total = res.total || 0;
    _mediaState._offset = res.offset || 0;
    _mediaState._limit = res.limit || 50;
    _mediaState._currentPlatform = platformId;
    renderMediaToolbar();
    renderMediaRecords();
  } catch(e) {
    document.getElementById('media-records').innerHTML = '<div class="empty-state">加载失败: ' + e.message + '</div>';
  }
}

function renderMediaToolbar() {
  const fileName = _mediaState.currentFile.split('/').pop();
  document.getElementById('media-toolbar').innerHTML = `
    <span>${getPlatformName(_mediaState._currentPlatform)}</span>
    <span style="color:var(--text3)"> / </span>
    <span>${fileName}</span>
    <span style="color:var(--text3);margin-left:12px">共 ${_mediaState._total} 条</span>
  `;
}

function getPlatformName(id) {
  const names = { douyin: '抖音', xhs: '小红书', weibo: '微博', kuaishou: '快手', bili: 'B站', tieba: '贴吧', zhihu: '知乎' };
  return names[id] || id;
}

function renderMediaRecords() {
  const container = document.getElementById('media-records');
  if (!_mediaState.records.length) {
    container.innerHTML = '<div class="empty-state">暂无数据</div>';
    document.getElementById('media-footer').style.display = 'none';
    return;
  }

  container.innerHTML = _mediaState.records.map((r, i) => {
    const content = r.content || r.desc || r.title || '(无内容)';
    const nickname = r.nickname || r.user_nickname || '';
    const liked = r.liked_count || r.like_count || r.comment_like_count || '0';
    const comment = r.comment_count || r.comments_count || r.sub_comment_count || '0';
    const collect = r.collected_count || r.forward_count || '0';
    const ip = r.ip_location || '';
    const platform = _mediaState._currentPlatform;
    const isSelected = _mediaState.selected.has(i);

    return `
    <div class="media-record${isSelected ? ' selected' : ''}" onclick="toggleMediaRecord(${i}, event)">
      <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()" />
      <div class="media-record-content">
        <div class="media-record-text">${escapeHtml(content.substring(0, 300))}${content.length > 300 ? '...' : ''}</div>
        <div class="media-record-meta">
          ${nickname ? '<span>👤 ' + escapeHtml(nickname) + '</span>' : ''}
          <span>👍 ' + liked + '</span>
          <span>💬 ' + comment + '</span>
          ${collect ? '<span>⭐ ' + collect + '</span>' : ''}
          ${ip ? '<span>🌐 ' + ip + '</span>' : ''}
          <span>📌 ' + platform + '</span>
        </div>
      </div>
    </div>
    `;
  }).join('');

  document.getElementById('media-footer').style.display = 'flex';
  updateMediaSelectedCount();
}

function toggleMediaRecord(index, event) {
  if (event.target.type === 'checkbox') return;
  if (_mediaState.selected.has(index)) {
    _mediaState.selected.delete(index);
  } else {
    _mediaState.selected.add(index);
  }
  // 更新 checkbox 状态
  const record = document.querySelectorAll('.media-record')[index];
  if (record) {
    record.classList.toggle('selected', _mediaState.selected.has(index));
    record.querySelector('input[type="checkbox"]').checked = _mediaState.selected.has(index);
  }
  updateMediaSelectedCount();
}

function updateMediaSelectedCount() {
  document.getElementById('media-selected-count').textContent = '已选择: ' + _mediaState.selected.size + ' 条';
}

async function mediaSendToLibrary() {
  if (_mediaState.selected.size === 0) {
    showToast('请先选择要导入的内容', 'warning');
    return;
  }

  const records = [];
  for (const idx of _mediaState.selected) {
    const r = _mediaState.records[idx];
    const content = r.content || r.desc || r.title || '';
    if (content) {
      records.push({
        platform: _mediaState._currentPlatform,
        content: content,
        metadata: {
          nickname: r.nickname || '',
          liked_count: r.liked_count || r.like_count || 0,
          comment_count: r.comment_count || r.comments_count || 0,
          collect_count: r.collected_count || 0,
          ip_location: r.ip_location || '',
          source_keyword: r.source_keyword || '',
          create_time: r.create_time || '',
          note_url: r.note_url || r.aweme_url || '',
        }
      });
    }
  }

  if (records.length === 0) {
    showToast('没有有效内容可导入', 'warning');
    return;
  }

  try {
    const res = await api('POST', '/media/import', { records: records });
    showToast('✅ 已导入 ' + res.imported + ' 条素材', 'success');
    // 清空选择
    _mediaState.selected.clear();
    document.getElementById('media-records').innerHTML = '<div class="empty-state">已导入完成，可继续选择更多内容导入</div>';
    document.getElementById('media-footer').style.display = 'none';
  } catch(e) {
    showToast('导入失败: ' + (e.message || e), 'error');
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
