<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Iframe Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <h1>Simple Iframe Test</h1>
    <p>Below should appear a styled box with gradient background:</p>

    <iframe id="test-frame" style="width: 100%; height: 200px; border: 1px solid #ccc;"></iframe>

    <script>
        // Test 1: Simple HTML
        const simpleHtml = `
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"></head>
            <body>
                <h1 style="font-size: 24px; color: blue;">Hello</h1>
                <p style="background: linear-gradient(180deg, rgba(7,193,96,0.08) 0%, rgba(7,193,96,0.03) 100%); padding: 12px;">
                    This should have a gradient background.
                </p>
            </body>
            </html>
        `;
        document.getElementById('test-frame').srcdoc = simpleHtml;
    </script>
</body>
</html>
